name: Release bitcoind image
on:
  push:
    branches: [main, feat/builder-image-adjustment]
    paths: ["images/bitcoind/**"]
  pull_request:
    branches: [main]
    paths: ["images/bitcoind/**"]

# Declare default permissions as read only.
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  actions: read
  security-events: read

jobs:
  call:
    uses: ./.github/workflows/release-image.yml
    permissions:
      actions: read
      checks: read
      contents: read
      deployments: read
      discussions: read
      issues: read
      models: read
      pages: read
      pull-requests: read
      repository-projects: read
      statuses: read
      security-events: read
      artifact-metadata: read
      packages: write
      id-token: write
      attestations: write
    with:
      image: ghcr.io/${{ github.repository }}/bitcoind
      context: images/bitcoind
      dockerfile: Dockerfile
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
